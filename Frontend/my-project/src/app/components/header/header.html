<nav class = "nav">
    <div class ="container">
        <div class ="navbar">
            <ul class = "nav-list">
                <a class="image" href="'/"><img class="image" src="logo.webp"></a>
                <li class = "nav-item">
                    <a class ="nav-link" href="/"> Home</a>
                </li>
                <li class = "nav-item">
                    <a class ="nav-link" href="#" [routerLink]="['/blog']">Blog</a>
                </li>
                <li class = "nav-item">
                    <a class ="nav-link" href="#" [routerLink]="['/contact']">Contact</a>
                </li>
                <form>
                    <input  class="form-control" type="text" placeholder="Search" (input)="onSearch($any($event.target).value)" aria-label="Search">
                </form>
            </ul>
            <div class="auth-buttons">
                @if (!authService.isLoggedIn()) {
                  <a routerLink="/login" class="btn">Login</a>
                  <a routerLink="/register" class="btn btn-primary">Register</a>
                } @else {
                  <a routerLink="/profile" class="btn">My Profile</a>
                  <button (click)="onLogout()" class="btn btn-outline">Logout</button>
                }
              </div>
        </div>
       
    </div>
</nav>
