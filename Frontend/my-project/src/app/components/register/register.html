<div class="auth-wrapper">
    <div class="auth-card">
      <h2>Create Account</h2>
      <p class="subtitle">Join the RecipeHub community</p>
  
      <form [formGroup]="registerForm" (ngSubmit)="onRegister()">
        <div class="form-row">
          <div class="form-group">
            <label>First Name</label>
            <input type="text" formControlName="firstName" placeholder="Name">
          </div>
          <div class="form-group">
            <label>Last Name</label>
            <input type="text" formControlName="lastName" placeholder="Surname">
          </div>
        </div>
  
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" formControlName="email" placeholder="name@example.com">
        </div>
  
        <div class="form-group">
          <label>Password</label>
          <input type="password" formControlName="password" placeholder="••••••••">
        </div>
  
        <button type="submit" class="auth-btn">Register</button>
      </form>
  
      <div class="switch-auth">
        Already have an account? <a routerLink="/login">Login here</a>
      </div>
    </div>
  </div>
